<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Command Center | PPL ERP</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 👑 THE ADMIN SIDEBAR */
        .sidebar {
            width: 250px;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
            color: #3498db;
            letter-spacing: 2px;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #bdc3c7;
            padding: 15px 20px;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            border-left: 4px solid transparent;
            transition: 0.3s;
        }

        .nav-btn:hover, .nav-btn.active {
            background-color: #34495e;
            color: white;
            border-left: 4px solid #3498db;
        }

        .logout-btn {
            margin-top: auto;
            background-color: #c0392b;
            color: white;
            border: none;
            padding: 15px;
            cursor: pointer;
            font-weight: bold;
        }

        .logout-btn:hover { background-color: #e74c3c; }

        /* 📊 MAIN CONTENT AREA */
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        /* 📈 SUMMARY CARDS */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-top: 4px solid #3498db;
        }

        .card h3 { margin: 0 0 10px 0; color: #7f8c8d; font-size: 16px; }
        .card .value { font-size: 32px; font-weight: bold; color: #2c3e50; margin: 0; }
        
        .card.sales { border-top-color: #2ecc71; }
        .card.prod { border-top-color: #f39c12; }
        .card.acc { border-top-color: #e74c3c; }

        /* QUICK ACTION BUTTONS */
        .quick-actions {
            display: flex;
            gap: 15px;
        }
        
        .action-btn {
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
            border: none;
            cursor: pointer;
        }
        .action-btn:hover { background-color: #2980b9; }

    </style>
</head>
<body>

    <div class="sidebar">
        <h2>PPL ERP</h2>
        <button class="nav-btn active" onclick="window.location.href='admin-dashboard.html'">👑 God View</button>
        
        <button class="nav-btn" onclick="window.location.href='sales-dashboard.html'">🛒 Sales & Orders</button>
        <button class="nav-btn" onclick="window.location.href='production-dashboard.html'">⚙️ Factory Floor</button>
        <button class="nav-btn" onclick="window.location.href='billing-dashboard.html'">💰 Accounts & Billing</button>
        
        <button class="nav-btn" onclick="window.location.href='inventory-master.html'">📦 Master Inventory</button>
        
        <button class="logout-btn" onclick="logout()">Log Out</button>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Master Command Center</h1>
            <div>
                <span style="color: #7f8c8d; font-weight: bold;">Logged in as: </span>
                <span id="adminNameDisplay" style="color: #2c3e50; font-weight: bold; font-size: 18px;">Admin</span>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <h3>Total Finished Goods</h3>
                <p class="value" id="totalStockCount">Loading...</p>
            </div>
            <div class="card sales">
                <h3>Pending Sales Orders</h3>
                <p class="value">0</p> </div>
            <div class="card prod">
                <h3>Active Factory Batches</h3>
                <p class="value">0</p> </div>
            <div class="card acc">
                <h3>Unpaid Invoices</h3>
                <p class="value">₹ 0</p> </div>
        </div>

        <h2>Admin Quick Actions</h2>
        <div class="quick-actions">
            <button class="action-btn" onclick="alert('User Management coming soon!')">👥 Manage Users</button>
            <button class="action-btn" style="background-color: #f39c12;" onclick="alert('Raw Materials Setup coming soon!')">🔩 Add Raw Materials</button>
        </div>
    </div>

    <script>
        // 🔒 SECURITY CHECK: KICK OUT ANYONE WHO IS NOT AN ADMIN
        if (localStorage.getItem("erp_auth") !== "true" || localStorage.getItem("erp_role") !== "admin") {
            alert("SECURITY ALERT: You do not have Admin privileges.");
            window.location.href = "index.html"; // Kick them back to login
        }

        // Display the Admin's Name
        document.getElementById('adminNameDisplay').innerText = localStorage.getItem("erp_name") || "Master Admin";

        const API_URL = 'https://ppl-warehouse-wkdp.onrender.com/api';

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // Just pulling total stock as an example of what the Admin can see
        async function fetchAdminSummary() {
            try {
                const response = await fetch(`${API_URL}/products`);
                const products = await response.json();
                
                let totalBolts = 0;
                products.forEach(p => { totalBolts += (p.currentStock || 0); });
                
                document.getElementById('totalStockCount').innerText = totalBolts.toLocaleString();
            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        fetchAdminSummary();
    </script>

</body>
</html>
